<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Warwar Hunt V50</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="stats">Loading…</div>
    <div id="ammo">—</div>
    <div id="buttons">
      <button id="reloadBtn">Reload</button>
      <button id="callBtn">Call</button>
      <button id="pauseBtn">Pause</button>
      <button id="mapBtn">Map</button>
    </div>
    <div id="tips">يسار الشاشة: حركة 🕹️ | يمين الشاشة: تصويب/إطلاق 🎯</div>
  </div>

  <!-- Joysticks UI -->
  <div id="joyMove" class="joy">
    <div class="joyBase"></div>
    <div class="joyKnob"></div>
    <div class="joyLabel">MOVE</div>
  </div>

  <div id="joyAim" class="joy">
    <div class="joyBase"></div>
    <div class="joyKnob"></div>
    <div class="joyLabel">AIM</div>
  </div>

  <canvas id="c"></canvas>
  <script src="game.js"></script>
</body>
</html>
