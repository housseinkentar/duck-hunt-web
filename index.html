<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Call of the Wild - Web Lite</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="hud">
    <div id="topbar">
      <div id="status">Loading…</div>
      <div id="ammo">Ammo: 5/5</div>
    </div>

    <div id="windBox">
      <div id="windArrow"></div>
      <div id="windTxt">Wind</div>
    </div>

    <div id="actions">
      <button id="fireBtn">FIRE</button>
      <button id="reloadBtn">RELOAD</button>
      <button id="callBtn">CALL</button>
      <button id="camBtn">CAM</button>
    </div>

    <div id="hint">يسار: مشي 🕹️ | يمين: نظر 🎯 | CALL يجذب | الريح ضدك = الطيور تهرب</div>
  </div>

  <div id="joyL" class="joy">
    <div class="base"></div>
    <div class="knob"></div>
    <div class="label">MOVE</div>
  </div>

  <div id="joyR" class="joy">
    <div class="base"></div>
    <div class="knob"></div>
    <div class="label">LOOK</div>
  </div>

  <div id="crosshair"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
